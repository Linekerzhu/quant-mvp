# Risk Limits Configuration
# Multi-layer risk management

# Layer 1: Signal Level (v4: factor-based, no ML probability threshold)
signal_level:
  # v4 uses cross-sectional factor ranking, not model probability
  strategy: multifactor_monthly
  top_k: 15  # Number of positions to hold
  composite_weights:
    momentum: 0.70
    quality: 0.15
    value: 0.15

# Layer 2: Position Level
position_level:
  # Single stock limit (v4: inv-vol max weight ~10%)
  single_stock_max: 0.12  # 12% max per position (slight buffer over inv-vol max)
  
  # Industry exposure limit (v4: sector_cap = 0.25)
  industry_max: 0.25  # 25% max per industry — matches walk_forward.py sector_cap
  
  # Sector tracking
  track_sectors: true
  sector_source: gics

# Layer 3: Portfolio Level
portfolio_level:
  # Daily loss limit
  daily_loss_limit: 0.03  # 3% daily loss limit (raised from 1% for v4 momentum strategy)
  
  # Maximum drawdown (v4: backtested MaxDD = 16.6%, GO gate = 35%)
  max_drawdown:
    warning: 0.20   # 20% — start reducing positions
    kill_switch: 0.30  # 30% — full exit (below 35% GO gate)
  
  # Consecutive loss protection
  consecutive_losses:
    threshold: 5  # Days (raised from 3 — monthly rebalance means longer drawdowns)
    action: reduce_50_percent  # Reduce position by 50%
  
  # Total leverage
  max_gross_leverage: 1.0  # No leverage
  max_net_leverage: 1.0

# Layer 4: System Level
system_level:
  # Kill switch triggers
  kill_switch_triggers:
    - max_drawdown_breach
    - data_integrity_failure
    - model_drift_severe
    - execution_failure_repeated
  
  # Auto-degrade to paper trading
  auto_degrade:
    enabled: true
    triggers:
      consecutive_sharpe:
        threshold: -1.0  # Daily Sharpe < -1
        consecutive_days: 5
      drawdown:
        threshold: 0.18  # 18% drawdown (v4 backtested MaxDD = 16.6%)
    
# PDT Guard
pdt_guard:
  enabled: true
  max_day_trades: 3  # Per 5 rolling business days
  pattern_threshold: 4  # 4+ day trades = PDT flag
  
  # Account requirements
  min_account_value: 25000  # To avoid PDT restriction
  account_type: margin  # Per Plan v4 patch: MARGIN required
  
  # Prevention
  block_potential_day_trade: true
  warn_before_day_trade: true
