<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quant MVP v6.0 — Trading Terminal</title>
  <link rel="stylesheet" href="/static/style.css?v=30">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<header class="header">
  <div class="header-brand">
    <div class="header-logo">Q</div>
    <div>
      <div class="header-title">Quant MVP v6.0</div>
      <div class="header-subtitle">SMA + Momentum + MeanReversion + Kronos</div>
    </div>
  </div>
  <div class="header-status">
    <span class="header-date" id="headerDate">--</span>
    <span class="status-dot"></span>
  </div>
</header>

<div class="dashboard">
  <!-- ── Top Stats Bar ── -->
  <div class="top-stats" id="topStats">
    <div class="top-stat"><div class="top-stat-label">净值 NAV</div><div class="top-stat-value" id="tsNav">--</div></div>
    <div class="top-stat"><div class="top-stat-label">累计收益</div><div class="top-stat-value" id="tsCumReturn">--</div></div>
    <div class="top-stat"><div class="top-stat-label">未实现盈亏</div><div class="top-stat-value" id="tsUnrealized">--</div></div>
    <div class="top-stat"><div class="top-stat-label">已实现盈亏</div><div class="top-stat-value" id="tsRealized">--</div></div>
    <div class="top-stat"><div class="top-stat-label">最大回撤</div><div class="top-stat-value" id="tsMaxDD">--</div></div>
    <div class="top-stat"><div class="top-stat-label">仓位比</div><div class="top-stat-value" id="tsInvested">--</div></div>
    <div class="top-stat"><div class="top-stat-label">可用现金</div><div class="top-stat-value" id="tsCash">--</div></div>
    <div class="top-stat"><div class="top-stat-label">手续费</div><div class="top-stat-value" id="tsFriction">--</div></div>
  </div>

  <!-- ── Main Content ── -->
  <div class="main-content">
    <!-- Left: Charts -->
    <div class="charts-col">
      <div class="chart-toolbar">
        <div style="display:flex;align-items:center;gap:10px">
          <select class="symbol-select" id="symbolSelect"><option>Loading...</option></select>
          <span id="priceLabel" class="price-label"></span>
        </div>
        <div class="chart-tabs">
          <button class="chart-tab active" data-sub="volume" onclick="switchSub(this)">VOL</button>
          <button class="chart-tab" data-sub="rsi" onclick="switchSub(this)">RSI</button>
          <button class="chart-tab" data-sub="macd" onclick="switchSub(this)">MACD</button>
        </div>
      </div>
      <div class="chart-main" id="chartMain"></div>
      <div class="chart-sub" id="chartSub">
        <div class="chart-sub-label" id="subLabel">VOLUME</div>
      </div>
      <!-- Equity curve -->
      <div class="equity-section">
        <div class="section-title">📈 净值曲线</div>
        <div id="equityChart" style="height:90px"></div>
      </div>
    </div>

    <!-- Right: Data Panels -->
    <div class="data-col">
      <!-- Decision Chain -->
      <div class="panel decision-panel">
        <div class="panel-title">🔗 决策链 <span class="panel-badge" id="decisionSymbol">--</span></div>
        <div class="decision-chain" id="decisionChain">
          <div class="chain-placeholder">选择持仓股查看决策链</div>
        </div>
        <div class="key-factors" id="keyFactors"></div>
      </div>

      <!-- Holdings -->
      <div class="panel">
        <div class="panel-title">📦 当前持仓 <span class="panel-badge" id="holdingCount">0</span></div>
        <div class="table-scroll">
        <table class="data-table" id="holdingsTable">
          <thead><tr>
            <th>代码</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th><th>占比</th><th>天数</th>
          </tr></thead>
          <tbody id="holdingsBody"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
        </table>
        </div>
      </div>

      <!-- Trade Log -->
      <div class="panel">
        <div class="panel-title">📋 交易记录 <span class="panel-badge" id="tradeCount">0</span></div>
        <div class="table-scroll">
        <table class="data-table" id="tradesTable">
          <thead><tr>
            <th>日期</th><th>方向</th><th>代码</th><th>数量</th><th>价格</th><th>费用</th><th>盈亏</th>
          </tr></thead>
          <tbody id="tradesBody"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
        </table>
        </div>
      </div>

      <!-- Daily Performance -->
      <div class="panel">
        <div class="panel-title">📊 每日概况</div>
        <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th>日期</th><th>NAV</th><th>日收益</th><th>累计PnL</th><th>持仓</th><th>交易</th><th>手续费</th>
          </tr></thead>
          <tbody id="dailyBody"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
        </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js?v=30"></script>
</body>
</html>
